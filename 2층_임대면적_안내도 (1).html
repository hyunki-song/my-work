<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2층 임대면적 안내도</title>
<style>
  :root{
    --ink:#1f2937;
    --muted:#6b7280;
    --line:#e5e7eb;
    --accent:#e03a2f;
    --accent-soft:rgba(224,58,47,.14);
    --hover-soft:rgba(37,99,235,.12);
    --hover:#2563eb;
    --bg:#f7f7f5;
    --card:#ffffff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
    background:var(--bg); color:var(--ink); padding:20px;
  }
  .wrap{max-width:1280px;margin:0 auto}
  header{display:flex;align-items:baseline;gap:12px;margin-bottom:14px;flex-wrap:wrap}
  header h1{font-size:20px;font-weight:700;letter-spacing:-.02em}
  header .sub{font-size:13px;color:var(--muted)}
  .layout{display:flex;gap:16px;align-items:flex-start}
  .plan-card{flex:1 1 auto;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;min-width:0}
  .plan{position:relative;width:100%;user-select:none}
  .plan img{display:block;width:100%;height:auto;border-radius:6px;pointer-events:none}
  .room{
    position:absolute;cursor:pointer;border:2px solid transparent;border-radius:4px;
    transition:background .12s,border-color .12s;
    -webkit-tap-highlight-color:transparent;
  }
  .room:hover{background:var(--hover-soft);border-color:var(--hover)}
  .room:focus-visible{outline:3px solid var(--hover);outline-offset:-3px}
  .room.active{background:var(--accent-soft);border-color:var(--accent)}
  .panel{
    flex:0 0 300px;background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:20px;position:sticky;top:20px;
  }
  .panel .empty{color:var(--muted);font-size:14px;line-height:1.6;text-align:center;padding:36px 0}
  .panel .room-name{font-size:15px;color:var(--muted);margin-bottom:2px}
  .panel .room-no{font-size:34px;font-weight:800;color:var(--accent);letter-spacing:-.02em;margin-bottom:18px}
  .stat{display:flex;justify-content:space-between;align-items:baseline;padding:13px 0;border-top:1px solid var(--line)}
  .stat .label{font-size:13px;color:var(--muted)}
  .stat .value{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
  .stat .value small{font-size:12px;font-weight:500;color:var(--muted);margin-left:3px}
  .stat.main .value{color:var(--accent);font-size:24px}
  .totals{margin-top:16px;border-top:2px solid var(--ink);padding-top:12px;font-size:12.5px;color:var(--muted);line-height:1.8}
  .totals b{color:var(--ink);font-variant-numeric:tabular-nums}
  .hint{margin-top:10px;font-size:12px;color:var(--muted)}
  @media (max-width:860px){
    .layout{flex-direction:column}
    .panel{flex:none;width:100%;position:static}
  }
</style>
</head>
